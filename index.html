<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Keyboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FAFAF8;
    --bg2: #F2F1ED;
    --bg3: #E8E7E3;
    --text: #1A1A18;
    --text2: #6B6A65;
    --text3: #9C9B96;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.06);
    --white-key: #FFFFFF;
    --black-key: #1A1A18;
    --black-key-text: #FAFAF8;
    --accent: #534AB7;
    --accent-soft: #EEEDFE;
    --chord-I-bg: #EEEDFE; --chord-I-fg: #3C3489; --chord-I-hover: #CECBF6;
    --chord-IV-bg: #E1F5EE; --chord-IV-fg: #085041; --chord-IV-hover: #9FE1CB;
    --chord-V-bg: #E6F1FB; --chord-V-fg: #0C447C; --chord-V-hover: #B5D4F4;
    --chord-V7-bg: #FAECE7; --chord-V7-fg: #712B13; --chord-V7-hover: #F5C4B3;
    --chord-vi-bg: #FBEAF0; --chord-vi-fg: #72243E; --chord-vi-hover: #F4C0D1;
    --chord-ii-bg: #FAEEDA; --chord-ii-fg: #633806; --chord-ii-hover: #FAC775;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1A18;
      --bg2: #252523;
      --bg3: #333330;
      --text: #EEEEE8;
      --text2: #9C9B96;
      --text3: #6B6A65;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.06);
      --white-key: #2A2A28;
      --black-key: #0E0E0D;
      --black-key-text: #9C9B96;
      --chord-I-bg: #26215C; --chord-I-fg: #CECBF6; --chord-I-hover: #3C3489;
      --chord-IV-bg: #04342C; --chord-IV-fg: #9FE1CB; --chord-IV-hover: #085041;
      --chord-V-bg: #042C53; --chord-V-fg: #B5D4F4; --chord-V-hover: #0C447C;
      --chord-V7-bg: #4A1B0C; --chord-V7-fg: #F5C4B3; --chord-V7-hover: #712B13;
      --chord-vi-bg: #4B1528; --chord-vi-fg: #F4C0D1; --chord-vi-hover: #72243E;
      --chord-ii-bg: #412402; --chord-ii-fg: #FAC775; --chord-ii-hover: #633806;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--text2);
    margin-bottom: 1.5rem;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .controls label {
    font-size: 0.8rem;
    color: var(--text2);
    font-weight: 500;
  }

  .controls select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }

  .controls select:hover { border-color: var(--accent); }

  .section-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
    align-self: flex-start;
    max-width: 960px;
    width: 100%;
  }

  .keyboard-wrap {
    overflow-x: auto;
    margin-bottom: 1.5rem;
    padding-bottom: 4px;
    width: 100%;
    max-width: 960px;
    display: flex;
    justify-content: center;
  }

  .keyboard {
    display: inline-flex;
    position: relative;
    height: 110px;
    flex-shrink: 0;
  }

  .key-white {
    position: absolute;
    top: 0;
    width: 36px;
    height: 110px;
    background: var(--white-key);
    border: 1px solid var(--border);
    border-radius: 0 0 6px 6px;
    cursor: pointer;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    transition: background 0.08s;
    user-select: none;
  }

  .key-white:hover { background: var(--accent-soft); }
  .key-white:active { background: var(--chord-I-hover); }

  .key-black {
    position: absolute;
    top: 0;
    width: 24px;
    height: 68px;
    background: var(--black-key);
    border: 1px solid rgba(0,0,0,0.3);
    border-radius: 0 0 4px 4px;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--black-key-text);
    transition: background 0.08s;
    user-select: none;
  }

  .key-black:hover { background: #333; }
  .key-black:active { background: #444; }

  .chord-grid-wrap {
    overflow-x: auto;
    width: 100%;
    max-width: 960px;
    padding-bottom: 4px;
  }

  .chord-grid {
    display: inline-grid;
    grid-template-columns: 40px repeat(12, 1fr);
    gap: 3px;
    min-width: fit-content;
  }

  .grid-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text2);
    text-align: center;
    padding: 6px 4px;
    min-width: 56px;
  }

  .grid-row-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
  }

  .chord-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 8px 4px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    text-align: center;
    min-width: 56px;
    transition: transform 0.1s, background 0.1s;
    user-select: none;
  }

  .chord-btn:active { transform: scale(0.94); }

  .status-bar {
    margin-top: 1rem;
    padding: 8px 16px;
    background: var(--bg2);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text2);
    min-height: 2em;
    text-align: center;
    max-width: 960px;
    width: 100%;
  }
</style>
</head>
<body>

<h1>Chord Keyboard</h1>
<p class="subtitle">3-octave keys + position-based chord grid</p>

<div class="controls">
  <label>Tone</label>
  <select id="toneSelect">
    <option value="piano">Piano</option>
    <option value="organ">Organ</option>
    <option value="synth">Synth pad</option>
    <option value="bell">Bell</option>
  </select>
</div>

<p class="section-label">Keyboard</p>
<div class="keyboard-wrap">
  <div class="keyboard" id="keyboard"></div>
</div>

<p class="section-label">Chords</p>
<div class="chord-grid-wrap">
  <div class="chord-grid" id="chordGrid"></div>
</div>

<div class="status-bar" id="status">Press a key or chord to play</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const octaves = [3,4,5];
const status = document.getElementById('status');

let currentTone = 'piano';

const tonePresets = {
  piano:  { oscillator: { type: 'triangle8' }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 1.2 }},
  organ:  { oscillator: { type: 'sine' },      envelope: { attack: 0.05, decay: 0.1, sustain: 0.8, release: 0.4 }},
  synth:  { oscillator: { type: 'sawtooth' },   envelope: { attack: 0.3, decay: 0.2, sustain: 0.5, release: 2.0 }},
  bell:   { oscillator: { type: 'sine' },       envelope: { attack: 0.001, decay: 1.5, sustain: 0, release: 1.5 }}
};

const synth = new Tone.PolySynth(Tone.Synth, {
  maxPolyphony: 6,
  voice: Tone.Synth,
  options: tonePresets.piano
}).toDestination();

const chordSynth = new Tone.PolySynth(Tone.Synth, {
  maxPolyphony: 6,
  voice: Tone.Synth,
  options: tonePresets.piano
}).toDestination();
chordSynth.volume.value = -3;

function applyTone(tone) {
  const preset = tonePresets[tone] || tonePresets.piano;
  synth.set(preset);
  chordSynth.set(preset);
}

document.getElementById('toneSelect').addEventListener('change', function() {
  currentTone = this.value;
  applyTone(currentTone);
});

function isBlack(note) { return note.includes('#'); }

const kb = document.getElementById('keyboard');
const allKeys = [];
octaves.forEach(oct => { notes.forEach(n => { allKeys.push(n + oct); }); });

const whiteKeys = allKeys.filter(k => !k.includes('#'));
const blackKeys = allKeys.filter(k => k.includes('#'));
const whiteW = 36;
const blackW = 24;

const whiteNoteIndex = {};
let wi = 0;
allKeys.forEach(k => { if (!k.includes('#')) { whiteNoteIndex[k] = wi; wi++; } });

kb.style.width = (whiteKeys.length * whiteW) + 'px';

whiteKeys.forEach((key, i) => {
  const btn = document.createElement('button');
  btn.className = 'key-white';
  btn.style.left = (i * whiteW) + 'px';
  btn.textContent = key.replace('#','♯');
  btn.addEventListener('mousedown', async () => {
    await Tone.start();
    synth.triggerAttackRelease(key, '8n');
    status.textContent = key;
  });
  kb.appendChild(btn);
});

blackKeys.forEach(key => {
  const base = key.replace('#','').replace(/\d/,'');
  const oct = key.slice(-1);
  const whiteRef = base + oct;
  const wIdx = whiteNoteIndex[whiteRef];
  if (wIdx === undefined) return;
  const btn = document.createElement('button');
  btn.className = 'key-black';
  btn.style.left = (wIdx * whiteW + whiteW - blackW / 2) + 'px';
  btn.textContent = key.replace('#','♯');
  btn.addEventListener('mousedown', async () => {
    await Tone.start();
    synth.triggerAttackRelease(key, '8n');
    status.textContent = key;
  });
  kb.appendChild(btn);
});

function midiToNote(m) { return notes[m % 12] + Math.floor(m / 12 - 1); }
function noteToMidi(n) {
  const match = n.match(/^([A-G]#?)(\d)$/);
  if (!match) return 60;
  const idx = notes.indexOf(match[1]);
  return (parseInt(match[2]) + 1) * 12 + idx;
}

function chordVoicing(rootNote, type) {
  const rootMidi = noteToMidi(rootNote + '3');
  const voicings = {
    'I':   (r) => [r, r+4, r+7],
    'ii':  (r) => [r-1, r+2, r+5],
    'IV':  (r) => [r, r+5, r+9],
    'V':   (r) => [r-1, r+2, r+7],
    'V7':  (r) => [r-1, r+5, r+7],
    'vi':  (r) => [r, r+4, r+9],
  };
  const fn = voicings[type];
  if (!fn) return [rootMidi];
  return fn(rootMidi).map(m => midiToNote(m));
}

function chordLabel(rootNote, type) {
  const ri = notes.indexOf(rootNote);
  const labels = {
    'I':  notes[ri],
    'ii': notes[(ri+2)%12] + 'm',
    'IV': notes[(ri+5)%12],
    'V':  notes[(ri+7)%12],
    'V7': notes[(ri+7)%12] + '7',
    'vi': notes[(ri+9)%12] + 'm',
  };
  return labels[type] || type;
}

const chordTypes = ['I','IV','V','V7','vi','ii'];
const grid = document.getElementById('chordGrid');

const cssMap = {
  'I':  { bg: 'var(--chord-I-bg)',  fg: 'var(--chord-I-fg)',  hover: 'var(--chord-I-hover)' },
  'IV': { bg: 'var(--chord-IV-bg)', fg: 'var(--chord-IV-fg)', hover: 'var(--chord-IV-hover)' },
  'V':  { bg: 'var(--chord-V-bg)',  fg: 'var(--chord-V-fg)',  hover: 'var(--chord-V-hover)' },
  'V7': { bg: 'var(--chord-V7-bg)', fg: 'var(--chord-V7-fg)', hover: 'var(--chord-V7-hover)' },
  'vi': { bg: 'var(--chord-vi-bg)', fg: 'var(--chord-vi-fg)', hover: 'var(--chord-vi-hover)' },
  'ii': { bg: 'var(--chord-ii-bg)', fg: 'var(--chord-ii-fg)', hover: 'var(--chord-ii-hover)' },
};

const emptyCorner = document.createElement('div');
grid.appendChild(emptyCorner);

notes.forEach(n => {
  const h = document.createElement('div');
  h.className = 'grid-header';
  h.textContent = n;
  grid.appendChild(h);
});

chordTypes.forEach((type) => {
  const lbl = document.createElement('div');
  lbl.className = 'grid-row-label';
  lbl.textContent = type;
  grid.appendChild(lbl);

  const c = cssMap[type];

  notes.forEach(rootNote => {
    const btn = document.createElement('button');
    btn.className = 'chord-btn';
    btn.style.background = c.bg;
    btn.style.color = c.fg;
    btn.textContent = chordLabel(rootNote, type);

    btn.addEventListener('mouseenter', () => { btn.style.background = c.hover; });
    btn.addEventListener('mouseleave', () => { btn.style.background = c.bg; });
    btn.addEventListener('mousedown', async () => {
      await Tone.start();
      const voicing = chordVoicing(rootNote, type);
      chordSynth.triggerAttackRelease(voicing, '2n');
      status.textContent = chordLabel(rootNote, type) + '  →  ' + voicing.join(', ');
    });
    grid.appendChild(btn);
  });
});
</script>
</body>
</html>
